services:
  - type: web
    name: cardapio-digital
    env: node
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cardapio-db
          property: connectionString
      - key: PORT
        value: 10000

databases:
  - name: cardapio-db
    databaseName: cardapio_digital
    plan: free
