<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery - Cardápio Digital Universal (MyGateway)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- MyGateway Integration -->
    <script src="mygateway-integration.js"></script>
    
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <!-- QR Code -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    
    <style>
        .header-banner {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
        }
        .header-banner img {
            width: 100%;
            height: auto;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            color: #333;
            min-height: 100vh;
        }
        
        .page-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .delivery-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .delivery-section h2 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 20px;
            border-bottom: 3px solid #007bff;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #007bff;
        }
        
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        
        .btn-primary {
            background: #007bff;
            color: white;
        }
        
        .btn-primary:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background: #218838;
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c82333;
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .success-message {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .error-message {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .payment-methods {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .payment-method {
            padding: 15px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .payment-method:hover {
            border-color: #007bff;
        }
        
        .payment-method.selected {
            border-color: #28a745;
            background: #e8f5e8;
        }
        
        .payment-method i {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #007bff;
        }
        
        .payment-method.selected i {
            color: #28a745;
        }
        
        .cart-summary {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .cart-summary h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        .cart-item:last-child {
            border-bottom: none;
        }
        
        @media (max-width: 768px) {
            .payment-methods {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header-banner">
        <img src="https://via.placeholder.com/1200x300" alt="Delivery Banner">
    </div>

    <div class="page-wrapper">
        <div class="container">
            <div class="delivery-section">
                <h2>🚚 Novo Pedido com MyGateway</h2>
                
                <div class="form-group">
                    <label for="customerName">Nome Completo</label>
                    <input type="text" id="customerName" placeholder="Seu nome completo" required>
                </div>

                <div class="form-group">
                    <label for="customerPhone">Telefone</label>
                    <input type="tel" id="customerPhone" placeholder="(11) 98765-4321" required>
                </div>

                <div class="form-group">
                    <label for="customerAddress">Endereço de Entrega</label>
                    <textarea id="customerAddress" rows="3" placeholder="Rua, número, bairro, cidade" required></textarea>
                </div>

                <div class="form-group">
                    <label for="deliveryDistance">Distância (km)</label>
                    <input type="number" id="deliveryDistance" step="0.1" min="0.5" placeholder="Ex: 5.2" required>
                </div>

                <div class="form-group">
                    <label>Método de Pagamento</label>
                    <div class="payment-methods">
                        <div class="payment-method" data-method="pix">
                            <i class="fas fa-qrcode"></i>
                            <p>PIX</p>
                            <small>0,99% de taxa</small>
                        </div>
                        <div class="payment-method" data-method="card">
                            <i class="fas fa-credit-card"></i>
                            <p>Cartão</p>
                            <small>1,00% de taxa</small>
                        </div>
                        <div class="payment-method" data-method="money">
                            <i class="fas fa-money-bill-wave"></i>
                            <p>Dinheiro</p>
                            <small>Sem taxa</small>
                        </div>
                    </div>
                </div>

                <div style="display: flex; gap: 15px;">
                    <button class="btn btn-success" onclick="processarPedido()" id="btn-processar">
                        🚀 Processar Pedido
                    </button>
                    <button class="btn btn-danger" onclick="cancelarPedido()">
                        ❌ Cancelar
                    </button>
                </div>
            </div>

            <!-- Resumo do Carrinho -->
            <div class="cart-summary" id="cart-summary">
                <h3>🛒 Resumo do Pedido</h3>
                <div id="cart-items">
                    <!-- Items will be loaded here -->
                </div>
                <div id="cart-total">
                    <!-- Total will be calculated here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Sistema de Delivery com MyGateway
        let myGateway = null;
        let selectedPaymentMethod = null;

        // Inicialização
        document.addEventListener('DOMContentLoaded', function() {
            console.log('[DELIVERY] Inicializando sistema com MyGateway...');
            
            // Inicializar MyGateway
            myGateway = new MyGatewayIntegration();
            
            // Carregar carrinho
            loadCartSummary();
            
            // Configurar eventos
            setupEventListeners();
            
            console.log('[DELIVERY] Sistema inicializado com sucesso!');
        });

        // Carregar resumo do carrinho
        function loadCartSummary() {
            const cartItems = JSON.parse(localStorage.getItem('cartItems') || '[]');
            const cartItemsDiv = document.getElementById('cart-items');
            const cartTotalDiv = document.getElementById('cart-total');
            
            if (cartItems.length === 0) {
                cartItemsDiv.innerHTML = '<p style="text-align: center; color: #666;">Carrinho vazio</p>';
                cartTotalDiv.innerHTML = '';
                return;
            }
            
            // Mostrar itens
            cartItemsDiv.innerHTML = cartItems.map(item => `
                <div class="cart-item">
                    <span>${item.name} x${item.quantity}</span>
                    <span>R$ ${(item.price * item.quantity).toFixed(2)}</span>
                </div>
            `).join('');
            
            // Calcular total
            const total = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            cartTotalDiv.innerHTML = `<h4><strong>Total: R$ ${total.toFixed(2)}</strong></h4>`;
        }

        // Configurar eventos
        function setupEventListeners() {
            // Métodos de pagamento
            document.querySelectorAll('.payment-method').forEach(method => {
                method.addEventListener('click', function() {
                    document.querySelectorAll('.payment-method').forEach(m => m.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedPaymentMethod = this.dataset.method;
                });
            });
            
            // Distância de entrega
            document.getElementById('deliveryDistance').addEventListener('input', updateDeliveryInfo);
        }

        // Atualizar informações de entrega
        function updateDeliveryInfo() {
            const distance = parseFloat(this.value) || 0;
            const cartItems = JSON.parse(localStorage.getItem('cartItems') || '[]');
            const total = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            if (distance > 0 && total > 0) {
                const taxaEntrega = distance * 2.00; // R$2,00 por km
                const totalComTaxa = total + taxaEntrega;
                
                // Mostrar informações (opcional)
                console.log(`Distância: ${distance}km, Taxa: R$${taxaEntrega.toFixed(2)}, Total: R$${totalComTaxa.toFixed(2)}`);
            }
        }

        // Processar pedido com MyGateway
        async function processarPedido() {
            console.log('[DELIVERY] Processando pedido com MyGateway...');
            
            try {
                // Verificar se MyGateway está disponível
                if (!myGateway) {
                    console.log('[DELIVERY] MyGateway não disponível');
                    alert('Sistema de pagamento não disponível');
                    return;
                }
                
                // Obter dados do formulário
                const customerName = document.getElementById('customerName').value;
                const customerPhone = document.getElementById('customerPhone').value;
                const customerAddress = document.getElementById('customerAddress').value;
                const deliveryDistance = parseFloat(document.getElementById('deliveryDistance').value);
                
                // Validação
                if (!customerName || !customerPhone || !customerAddress || !deliveryDistance) {
                    alert('Preencha todos os campos!');
                    return;
                }
                
                // Calcular total do carrinho
                const cartItems = JSON.parse(localStorage.getItem('cartItems') || '[]');
                const total = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                
                // Calcular taxas
                const split = myGateway.calcularSplit(total, 'pix');
                console.log('[DELIVERY] Split calculado:', split);
                
                // Dados do pedido
                const pedido = {
                    cliente: { nome: customerName, telefone: customerPhone },
                    endereco: customerAddress,
                    total: total,
                    distanciaKm: deliveryDistance,
                    metodoPagamento: selectedPaymentMethod,
                    numero: Date.now().toString()
                };
                
                // Processar pagamento baseado no método
                if (selectedPaymentMethod === 'pix') {
                    await processarPixMyGateway(pedido, split);
                } else if (selectedPaymentMethod === 'card') {
                    await processarCartaoMyGateway(pedido, split);
                } else if (selectedPaymentMethod === 'money') {
                    await processarDinheiroMyGateway(pedido, split);
                }
                
            } catch (error) {
                console.error('[DELIVERY] Erro ao processar pedido:', error);
                alert('Erro ao processar pedido: ' + error.message);
            }
        }

        // Processar PIX MyGateway
        async function processarPixMyGateway(pedido, split) {
            console.log('[DELIVERY] Processando PIX com MyGateway...');
            
            try {
                // Gerar QR Code PIX
                const pixData = await myGateway.gerarQRCode(pedido);
                
                // Mostrar tela de pagamento PIX
                showPixPaymentScreen(pixData, pedido, split);
                
            } catch (error) {
                console.error('[DELIVERY] Erro ao gerar PIX:', error);
                alert('Erro ao gerar PIX: ' + error.message);
            }
        }

        // Mostrar tela de pagamento PIX
        function showPixPaymentScreen(pixData, pedido, split) {
            console.log('[DELIVERY] Mostrando tela PIX...');
            
            const pixScreen = document.createElement('div');
            pixScreen.id = 'pixPaymentScreen';
            pixScreen.innerHTML = `
                <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 10000;">
                    <div style="background: white; color: #333; padding: 40px; border-radius: 20px; max-width: 500px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
                        <h2 style="margin-bottom: 20px; color: #333;">💰 Pagamento PIX</h2>
                        
                        <div style="background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                            <p style="font-size: 1.2rem; margin-bottom: 10px;">
                                <strong>Valor Total:</strong> R$${pedido.total.toFixed(2)}
                            </p>
                            <p style="font-size: 0.9rem; color: #666;">
                                Taxa MyGateway: ${split.taxa}% (R$${(pedido.total * split.taxa / 100).toFixed(2)})
                            </p>
                            <p style="font-size: 0.9rem; color: #666;">
                                Taxa Entrega: R$${(pedido.distanciaKm * 2.00).toFixed(2)} (${pedido.distanciaKm}km × R$2,00/km)
                            </p>
                        </div>
                        
                        <div style="margin-bottom: 20px;">
                            <img src="${pixData.qrCodeImage}" alt="QR Code PIX" style="max-width: 200px; border: 2px solid #ddd; border-radius: 10px;">
                            <p style="font-size: 0.8rem; color: #666; margin-top: 10px;">
                                Escaneie o QR Code ou copie o código
                            </p>
                        </div>
                        
                        <div style="background: #e8f5e8; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                            <p style="font-size: 0.8rem; margin: 0; word-break: break-all;">
                                <strong>Código PIX:</strong><br>
                                <span style="font-family: monospace;">${pixData.qrCode}</span>
                            </p>
                        </div>
                        
                        <div style="background: #fff3cd; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                            <p style="font-size: 0.8rem; margin: 0; color: #856404;">
                                <strong>⏰ Validade:</strong> ${new Date(pixData.expirationTime).toLocaleString()}<br>
                                <strong>📱 Transação:</strong> #${pixData.transactionId}
                            </p>
                        </div>
                        
                        <div style="display: flex; gap: 10px;">
                            <button onclick="copiarCodigoPix('${pixData.qrCode}')" style="flex: 1; padding: 12px 20px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem;">
                                📋 Copiar Código
                            </button>
                            <button onclick="verificarPagamentoMyGateway('${pixData.transactionId}')" style="flex: 1; padding: 12px 20px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem;">
                                ✅ Verificar Pagamento
                            </button>
                            <button onclick="fecharTelaPix()" style="flex: 1; padding: 12px 20px; background: #dc3545; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem;">
                                ❌ Fechar
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', pixScreen.outerHTML);
        }

        // Copiar código PIX
        function copiarCodigoPix(codigo) {
            navigator.clipboard.writeText(codigo).then(() => {
                alert('✅ Código PIX copiado com sucesso!');
            });
        }

        // Verificar pagamento MyGateway
        async function verificarPagamentoMyGateway(transactionId) {
            try {
                const status = await myGateway.verificarPagamento(transactionId);
                console.log('[DELIVERY] Status pagamento:', status);
                
                if (status.status === 'approved') {
                    console.log('[DELIVERY] Pagamento aprovado!');
                    alert('✅ Pagamento aprovado! Pedido confirmado.');
                    fecharTelaPix();
                } else if (status.status === 'rejected') {
                    alert('❌ Pagamento rejeitado. Tente novamente.');
                    fecharTelaPix();
                } else {
                    alert('⏳ Pagamento ainda pendente. Aguarde...');
                }
            } catch (error) {
                console.error('[DELIVERY] Erro ao verificar pagamento:', error);
                alert('Erro ao verificar pagamento');
            }
        }

        // Fechar tela PIX
        function fecharTelaPix() {
            const pixScreen = document.getElementById('pixPaymentScreen');
            if (pixScreen) {
                pixScreen.remove();
            }
        }

        // Cancelar pedido
        function cancelarPedido() {
            if (confirm('Tem certeza que deseja cancelar o pedido?')) {
                console.log('[DELIVERY] Pedido cancelado');
                // Limpar formulário
                document.getElementById('customerName').value = '';
                document.getElementById('customerPhone').value = '';
                document.getElementById('customerAddress').value = '';
                document.getElementById('deliveryDistance').value = '';
                
                // Resetar seleção
                document.querySelectorAll('.payment-method').forEach(method => {
                    method.classList.remove('selected');
                });
                selectedPaymentMethod = null;
            }
        }
    </script>
</body>
</html>
