<!DOCTYPE html>
<html>
<head>
    <title>Debug Registration</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; }
        button { background: #e74c3c; color: white; border: none; padding: 10px 20px; cursor: pointer; margin: 5px; }
        .result { margin-top: 20px; padding: 15px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Debug de Registro</h1>
    
    <button onclick="checkRegistration()">Verificar Registro</button>
    <button onclick="clearRegistration()">Limpar Registro</button>
    
    <div id="result"></div>
    
    <script>
        function checkRegistration() {
            const customerData = localStorage.getItem('customerData');
            const resultDiv = document.getElementById('result');
            
            if (customerData) {
                try {
                    const parsedData = JSON.parse(customerData);
                    resultDiv.innerHTML = `
                        <div class="result success">
                            <h3>Dados de Registro Encontrados:</h3>
                            <pre>${JSON.stringify(parsedData, null, 2)}</pre>
                            <p>Validação:</p>
                            <ul>
                                <li>Nome: ${parsedData.fullName ? '✅ OK' : '❌ Faltando'}</li>
                                <li>Telefone: ${parsedData.phone ? '✅ OK' : '❌ Faltando'}</li>
                                <li>Mesa: ${parsedData.tableNumber ? '✅ OK' : '❌ Faltando'}</li>
                            </ul>
                        </div>
                    `;
                } catch (error) {
                    resultDiv.innerHTML = `
                        <div class="result error">
                            <h3>Erro ao ler dados:</h3>
                            <p>${error.message}</p>
                        </div>
                    `;
                }
            } else {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h3>Nenhum dado de registro encontrado</h3>
                        <p>O registro ainda não foi concluído.</p>
                    </div>
                `;
            }
        }
        
        function clearRegistration() {
            localStorage.removeItem('customerData');
            document.getElementById('result').innerHTML = `
                <div class="result success">
                    <h3>Registro limpo com sucesso</h3>
                    <p>Os dados de registro foram removidos.</p>
                </div>
            `;
        }
        
        // Check registration on page load
        window.onload = checkRegistration;
    </script>
</body>
</html>
