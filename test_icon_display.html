<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Exibição de Ícones</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #e74c3c;
            text-align: center;
        }
        .icon-test {
            text-align: center;
            margin: 30px 0;
        }
        .icon-container {
            display: inline-block;
            margin: 0 20px;
        }
        .fab {
            font-size: 96px; /* Aumentado em 100% (de 48px para 96px) */
            display: block;
            margin-bottom: 10px;
        }
        
        .fa-facebook-f {
            color: #1877F2; /* Cor oficial do Facebook */
        }
        
        .fa-instagram {
            color: #E4405F; /* Cor oficial do Instagram */
        }
        
        .fa-whatsapp {
            color: #25D366; /* Cor oficial do WhatsApp */
        }
        .icon-label {
            font-size: 16px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Teste de Exibição de Ícones do Font Awesome</h1>
        
        <div class="icon-test">
            <div class="icon-container">
                <i class="fab fa-facebook-f"></i>
                <span class="icon-label">Facebook</span>
            </div>
            
            <div class="icon-container">
                <i class="fab fa-instagram"></i>
                <span class="icon-label">Instagram</span>
            </div>
            
            <div class="icon-container">
                <i class="fab fa-whatsapp"></i>
                <span class="icon-label">WhatsApp</span>
            </div>
        </div>
        
        <p style="text-align: center;">
            Se você conseguir ver os ícones acima, o Font Awesome está funcionando corretamente.
        </p>
    </div>
</body>
</html>
