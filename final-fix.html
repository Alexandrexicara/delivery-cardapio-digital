<!DOCTYPE html>
<html>
<head>
    <title>Final Fix for Customizations</title>
</head>
<body>
    <h1>Final Fix for Customizations</h1>
    <button onclick="applyCompleteFix()">Apply Complete Fix</button>
    <button onclick="checkStatus()">Check Current Status</button>
    <div id="output"></div>
    
    <script>
        function applyCompleteFix() {
            try {
                // 1. First check what images exist in uploads folder
                const logoUrl = '/uploads/1765579114013-194519.png';
                const backgroundUrl = '/uploads/1765579127632-3405.png';
                
                // 2. Load current customizations
                const customizations = JSON.parse(localStorage.getItem('establishmentCustomizations') || '{}');
                
                // 3. Ensure all required fields exist
                const completeCustomizations = {
                    establishmentName: customizations.establishmentName || 'ALMIRANTE BAR',
                    establishmentTagline: customizations.establishmentTagline || 'Cozinha Brasileira Autêntica',
                    establishmentAddress: customizations.establishmentAddress || 'Rua das Flores, 123 - Centro',
                    establishmentPhone: customizations.establishmentPhone || '(11) 98828-3318',
                    establishmentHours: customizations.establishmentHours || 'Ter-Sex: 18h-23h | Sáb-Dom: 12h-23h',
                    primaryColor: customizations.primaryColor || '#95a80b',
                    secondaryColor: customizations.secondaryColor || '#10d1b1',
                    facebook: customizations.facebook || '',
                    instagram: customizations.instagram || '',
                    whatsapp: customizations.whatsapp || '',
                    logo: logoUrl,
                    background: backgroundUrl
                };
                
                // 4. Save the complete customizations
                localStorage.setItem('establishmentCustomizations', JSON.stringify(completeCustomizations));
                
                // 5. Show success message
                document.getElementById('output').innerHTML = `
                    <p style="color: green; font-size: 18px;">✅ COMPLETE FIX APPLIED SUCCESSFULLY!</p>
                    <h3>What was fixed:</h3>
                    <ul>
                        <li>✅ Added missing logo: ${logoUrl}</li>
                        <li>✅ Added missing background: ${backgroundUrl}</li>
                        <li>✅ Ensured all customization fields exist</li>
                        <li>✅ Preserved existing values where available</li>
                    </ul>
                    
                    <h3>Next Steps:</h3>
                    <ol>
                        <li>Close this window</li>
                        <li>Refresh all pages to see the changes:</li>
                        <ul>
                            <li><a href="/usuario.html" target="_blank">Customer Menu</a></li>
                            <li><a href="/admin.html" target="_blank">Admin Panel</a></li>
                            <li><a href="/cozinha.html" target="_blank">Kitchen</a></li>
                            <li><a href="/balcao.html" target="_blank">Counter</a></li>
                            <li><a href="/garcom.html" target="_blank">Waiter</a></li>
                        </ul>
                        <li>You should now see:</li>
                        <ul>
                            <li>Your logo at the top of all pages</li>
                            <li>Your background image on all pages</li>
                            <li>All colors and text customizations</li>
                        </ul>
                    </ol>
                `;
            } catch (e) {
                document.getElementById('output').innerHTML = `<p style="color: red;">Error: ${e.message}</p>`;
            }
        }
        
        function checkStatus() {
            try {
                const customizations = JSON.parse(localStorage.getItem('establishmentCustomizations') || '{}');
                const output = document.getElementById('output');
                
                const hasLogo = !!customizations.logo;
                const hasBackground = !!customizations.background;
                const isComplete = hasLogo && hasBackground;
                
                output.innerHTML = `
                    <h2>Current Status:</h2>
                    <p style="font-size: 18px; color: ${isComplete ? 'green' : 'red'};">
                        ${isComplete ? '✅ COMPLETE' : '❌ INCOMPLETE'}
                    </p>
                    
                    <h3>Customization Fields:</h3>
                    <ul>
                        <li>Name: ${customizations.establishmentName || '❌ Missing'}</li>
                        <li>Tagline: ${customizations.establishmentTagline || '❌ Missing'}</li>
                        <li>Logo: ${customizations.logo ? '✅ Present' : '❌ Missing'}</li>
                        <li>Background: ${customizations.background ? '✅ Present' : '❌ Missing'}</li>
                        <li>Primary Color: ${customizations.primaryColor || '❌ Missing'}</li>
                        <li>Secondary Color: ${customizations.secondaryColor || '❌ Missing'}</li>
                    </ul>
                    
                    ${isComplete ? `
                        <h3>Preview:</h3>
                        ${customizations.logo ? `
                            <div>
                                <h4>Logo:</h4>
                                <img src="${customizations.logo}" alt="Logo" style="max-width: 200px; max-height: 100px; border: 1px solid #ccc;">
                            </div>
                        ` : ''}
                        ${customizations.background ? `
                            <div>
                                <h4>Background:</h4>
                                <div style="width: 200px; height: 100px; background-image: url(${customizations.background}); background-size: cover; border: 1px solid #ccc;"></div>
                            </div>
                        ` : ''}
                    ` : `
                        <p style="color: orange;">Click "Apply Complete Fix" to resolve missing images.</p>
                    `}
                `;
            } catch (e) {
                document.getElementById('output').innerHTML = `<p style="color: red;">Error: ${e.message}</p>`;
            }
        }
    </script>
</body>
</html>
