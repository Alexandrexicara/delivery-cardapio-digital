<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Motoboy - Sistema de Entregas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            margin: 20px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .login-header p {
            color: #666;
            font-size: 1.1em;
        }
        
        .tabs {
            display: flex;
            margin-bottom: 30px;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 5px;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .tab.active {
            background: #667eea;
            color: white;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #2c3e50;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #95a5a6;
            color: white;
            margin-top: 10px;
        }
        
        .btn-secondary:hover {
            background: #7f8c8d;
        }
        
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert.success {
            background: #d5f4e6;
            border: 1px solid #27ae60;
            color: #27ae60;
        }
        
        .alert.error {
            background: #f8d7da;
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }
        
        .alert.show {
            display: block;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }
        
        .back-link a:hover {
            color: #5a6fd8;
            text-decoration: underline;
        }
        
        .vehicle-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .vehicle-info h4 {
            color: #667eea;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 20px;
                margin: 10px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>
                <i class="fas fa-motorcycle"></i>
                Motoboy
            </h1>
            <p>Sistema de Entregas</p>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Login</div>
            <div class="tab" onclick="switchTab('register')">Cadastrar</div>
        </div>
        
        <div id="alert" class="alert"></div>
        
        <!-- Formulário de Login -->
        <div id="loginForm">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" required placeholder="seu@email.com">
                </div>
                
                <div class="form-group">
                    <label for="loginPassword">Senha</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>
            </form>
        </div>
        
        <!-- Formulário de Cadastro -->
        <div id="registerForm" style="display: none;">
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="registerName">Nome Completo</label>
                    <input type="text" id="registerName" required placeholder="João Silva">
                </div>
                
                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" required placeholder="joao@email.com">
                </div>
                
                <div class="form-group">
                    <label for="registerPhone">Telefone</label>
                    <input type="tel" id="registerPhone" required placeholder="(11) 98765-4321">
                </div>
                
                <div class="form-group">
                    <label for="registerCPF">CPF</label>
                    <input type="text" id="registerCPF" required placeholder="123.456.789-01" maxlength="14">
                </div>
                
                <div class="form-group">
                    <label for="registerPassword">Senha</label>
                    <input type="password" id="registerPassword" required placeholder="Mínimo 6 caracteres">
                </div>
                
                <div class="vehicle-info">
                    <h4>
                        <i class="fas fa-motorcycle"></i>
                        Dados do Veículo
                    </h4>
                    
                    <div class="form-group">
                        <label for="vehicleModel">Modelo da Moto</label>
                        <input type="text" id="vehicleModel" required placeholder="Honda CG 160">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="vehiclePlate">Placa</label>
                            <input type="text" id="vehiclePlate" required placeholder="ABC-1234" maxlength="8">
                        </div>
                        
                        <div class="form-group">
                            <label for="vehicleColor">Cor</label>
                            <input type="text" id="vehicleColor" required placeholder="Vermelha">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="vehicleYear">Ano</label>
                        <input type="number" id="vehicleYear" required placeholder="2023" min="2000" max="2025">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="cnhNumber">Número da CNH</label>
                    <input type="text" id="cnhNumber" required placeholder="12345678901" maxlength="11">
                </div>
                
                <div class="form-group">
                    <label for="cnhCategory">Categoria CNH</label>
                    <select id="cnhCategory" required>
                        <option value="">Selecione...</option>
                        <option value="A">A - Moto</option>
                        <option value="AB">AB - Moto e Carro</option>
                        <option value="ACC">ACC - Moto e Carro (Aprendiz)</option>
                    </select>
                </div>
                
                <!-- Dados Bancários para MyGateway -->
                <div class="vehicle-info" style="margin-top: 20px;">
                    <h4>
                        <i class="fas fa-university"></i>
                        Dados Bancários (MyGateway)
                    </h4>
                    
                    <div class="form-group">
                        <label for="bankCode">Código do Banco</label>
                        <input type="text" id="bankCode" required placeholder="001 (Banco do Brasil), 341 (Itaú), etc">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="bankAgency">Agência</label>
                            <input type="text" id="bankAgency" required placeholder="0000-0">
                        </div>
                        
                        <div class="form-group">
                            <label for="bankAccount">Conta Corrente</label>
                            <input type="text" id="bankAccount" required placeholder="00000-0">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="bankAccountType">Tipo de Conta</label>
                        <select id="bankAccountType" required>
                            <option value="">Selecione...</option>
                            <option value="CORRENTE">Conta Corrente</option>
                            <option value="POUPANCA">Poupança</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="pixKey">Chave PIX (opcional)</label>
                        <input type="text" id="pixKey" placeholder="CPF, email, telefone ou aleatória">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-user-plus"></i> Cadastrar
                </button>
            </form>
        </div>
        
        <div class="back-link">
            <a href="index.html">
                <i class="fas fa-arrow-left"></i> Voltar ao Início
            </a>
        </div>
    </div>
    
    <script>
        // Alternar entre login e cadastro
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const alert = document.getElementById('alert');
            
            // Limpar alerta
            alert.classList.remove('show');
            
            if (tab === 'login') {
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            } else {
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
            }
        }
        
        // Mostrar alerta
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert ${type} show`;
            
            setTimeout(() => {
                alert.classList.remove('show');
            }, 5000);
        }
        
        // Validar placa
        function validatePlate(plate) {
            const plateRegex = /^[A-Z]{3}[0-9][A-Z0-9][0-9]{2}$/;
            return plateRegex.test(plate.replace('-', '').toUpperCase());
        }
        
        // Validar CPF
        function validateCPF(cpf) {
            cpf = cpf.replace(/\D/g, '');
            
            if (cpf.length !== 11) return false;
            
            // Verificar CPFs inválidos conhecidos
            if (/^(\d)\1{10}$/.test(cpf)) return false;
            
            // Validação do CPF
            let sum = 0;
            let remainder;
            
            for (let i = 1; i <= 9; i++) {
                sum += parseInt(cpf.substring(i - 1, i)) * (11 - i);
            }
            
            remainder = (sum * 10) % 11;
            if (remainder === 10 || remainder === 11) remainder = 0;
            if (remainder !== parseInt(cpf.substring(9, 10))) return false;
            
            sum = 0;
            for (let i = 1; i <= 10; i++) {
                sum += parseInt(cpf.substring(i - 1, i)) * (12 - i);
            }
            
            remainder = (sum * 10) % 11;
            if (remainder === 10 || remainder === 11) remainder = 0;
            if (remainder !== parseInt(cpf.substring(10, 11))) return false;
            
            return true;
        }
        
        // Formatar CPF
        function formatCPF(input) {
            let value = input.value.replace(/\D/g, '');
            
            if (value.length > 11) value = value.slice(0, 11);
            
            if (value.length > 9) {
                value = `${value.slice(0,3)}.${value.slice(3,6)}.${value.slice(6,9)}-${value.slice(9)}`;
            } else if (value.length > 6) {
                value = `${value.slice(0,3)}.${value.slice(3,6)}.${value.slice(6)}`;
            } else if (value.length > 3) {
                value = `${value.slice(0,3)}.${value.slice(3)}`;
            }
            
            input.value = value;
        }
        
        // Validar CNH
        function validateCNH(cnh) {
            return cnh.length === 11 && /^\d+$/.test(cnh);
        }
        
        // Validar telefone
        function validatePhone(phone) {
            const phoneRegex = /^\(\d{2}\)\s\d{5}-\d{4}$/;
            return phoneRegex.test(phone);
        }
        
        // Formatar telefone
        function formatPhone(input) {
            let value = input.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            
            if (value.length > 6) {
                value = `(${value.slice(0,2)}) ${value.slice(2,7)}-${value.slice(7)}`;
            } else if (value.length > 2) {
                value = `(${value.slice(0,2)}) ${value.slice(2)}`;
            }
            
            input.value = value;
        }
        
        // Formatar placa
        function formatPlate(input) {
            let value = input.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
            
            if (value.length >= 4) {
                value = `${value.slice(0,3)}-${value.slice(3,7)}`;
            }
            
            input.value = value;
        }
        
        // Lidar com login
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            // Carregar motoboys cadastrados
            const motoboys = JSON.parse(localStorage.getItem('motoboys') || '[]');
            const motoboy = motoboys.find(m => m.email === email && m.password === password);
            
            if (motoboy) {
                // Salvar sessão
                sessionStorage.setItem('motoboySession', JSON.stringify(motoboy));
                
                showAlert('Login realizado com sucesso!', 'success');
                
                // Redirecionar para painel
                setTimeout(() => {
                    window.location.href = 'motoboy.html';
                }, 1500);
            } else {
                showAlert('Email ou senha incorretos!', 'error');
            }
        }
        
        // Lidar com cadastro
        function handleRegister(event) {
            event.preventDefault();
            
            const formData = {
                name: document.getElementById('registerName').value,
                email: document.getElementById('registerEmail').value,
                phone: document.getElementById('registerPhone').value,
                cpf: document.getElementById('registerCPF').value,
                password: document.getElementById('registerPassword').value,
                vehicle: {
                    model: document.getElementById('vehicleModel').value,
                    plate: document.getElementById('vehiclePlate').value.toUpperCase(),
                    color: document.getElementById('vehicleColor').value,
                    year: document.getElementById('vehicleYear').value
                },
                cnh: {
                    number: document.getElementById('cnhNumber').value,
                    category: document.getElementById('cnhCategory').value
                },
                bankAccount: {
                    bankCode: document.getElementById('bankCode').value,
                    agency: document.getElementById('bankAgency').value,
                    account: document.getElementById('bankAccount').value,
                    accountType: document.getElementById('bankAccountType').value,
                    pixKey: document.getElementById('pixKey').value || ''
                },
                status: 'offline',
                stats: {
                    todayDeliveries: 0,
                    totalDeliveries: 0,
                    avgTime: 25,
                    rating: 5.0
                },
                createdAt: new Date().toISOString()
            };
            
            // Validações
            if (!validatePlate(formData.vehicle.plate)) {
                showAlert('Placa inválida! Use o formato ABC-1234', 'error');
                return;
            }
            
            if (!validateCPF(formData.cpf)) {
                showAlert('CPF inválido! Verifique os dígitos', 'error');
                return;
            }
            
            if (!validateCNH(formData.cnh.number)) {
                showAlert('Número da CNH inválido! Deve conter 11 números', 'error');
                return;
            }
            
            if (!validatePhone(formData.phone)) {
                showAlert('Telefone inválido! Use o formato (11) 98765-4321', 'error');
                return;
            }
            
            if (formData.password.length < 6) {
                showAlert('Senha deve ter pelo menos 6 caracteres!', 'error');
                return;
            }
            
            // Carregar motoboys existentes
            const motoboys = JSON.parse(localStorage.getItem('motoboys') || '[]');
            
            // Verificar se email já existe
            if (motoboys.find(m => m.email === formData.email)) {
                showAlert('Este email já está cadastrado!', 'error');
                return;
            }
            
            // Verificar se CPF já existe
            if (motoboys.find(m => m.cpf === formData.cpf)) {
                showAlert('Este CPF já está cadastrado!', 'error');
                return;
            }
            
            // Validar dados bancários
            if (!BankDataModule.validateBankCode(formData.bankAccount.bankCode)) {
                showAlert('Código do banco inválido! Use 001, 341, 237, etc.', 'error');
                return;
            }
            
            if (!BankDataModule.validateAgency(formData.bankAccount.agency)) {
                showAlert('Agência inválida! Deve ter 4 ou 5 dígitos', 'error');
                return;
            }
            
            if (!BankDataModule.validateAccount(formData.bankAccount.account)) {
                showAlert('Conta corrente inválida! Verifique o número', 'error');
                return;
            }
            
            // Adicionar novo motoboy
            motoboys.push(formData);
            localStorage.setItem('motoboys', JSON.stringify(motoboys));
            
            // Salvar dados bancários no MyGateway
            BankDataModule.saveBankData('MOTOBOY', formData.cpf, formData.bankAccount);
            
            showAlert('Cadastro realizado com sucesso! Dados bancários salvos para MyGateway.', 'success');
            
            // Limpar formulário
            document.getElementById('registerForm').querySelector('form').reset();
            
            // Mudar para aba de login
            setTimeout(() => {
                switchTab('login');
            }, 2000);
        }
        
        // Adicionar listeners de formatação
        document.getElementById('registerPhone').addEventListener('input', function(e) {
            formatPhone(e.target);
        });
        
        document.getElementById('registerCPF').addEventListener('input', function(e) {
            formatCPF(e.target);
        });
        
        document.getElementById('vehiclePlate').addEventListener('input', function(e) {
            formatPlate(e.target);
        });
        
        // Verificar se já está logado
        window.onload = function() {
            const session = sessionStorage.getItem('motoboySession');
            if (session) {
                window.location.href = 'motoboy.html';
            }
        };
        
        // Formatação dos campos bancários
        document.getElementById('bankCode')?.addEventListener('input', function(e) {
            BankDataModule.formatBankCode(this);
        });
        
        document.getElementById('bankAgency')?.addEventListener('input', function(e) {
            BankDataModule.formatAgency(this);
        });
        
        document.getElementById('bankAccount')?.addEventListener('input', function(e) {
            BankDataModule.formatAccount(this);
        });
    </script>
    
    <!-- Scripts do MyGateway -->
    <script src="mygateway-integration.js"></script>
    <script src="mygateway-bankdata.js"></script>
</body>
</html>
