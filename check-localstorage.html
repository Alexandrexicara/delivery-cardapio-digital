<!DOCTYPE html>
<html>
<head>
    <title>Check LocalStorage Customizations</title>
</head>
<body>
    <h1>Check LocalStorage Customizations</h1>
    <button onclick="checkLocalStorage()">Check Current Customizations</button>
    <button onclick="fixCustomizations()">Fix Customizations</button>
    <button onclick="clearCustomizations()">Clear Customizations</button>
    <div id="output"></div>
    
    <script>
        function checkLocalStorage() {
            try {
                const customizations = JSON.parse(localStorage.getItem('establishmentCustomizations') || '{}');
                const output = document.getElementById('output');
                
                output.innerHTML = `
                    <h2>Current Customizations in LocalStorage:</h2>
                    <pre>${JSON.stringify(customizations, null, 2)}</pre>
                    
                    <h3>Image Status:</h3>
                    <p><strong>Logo:</strong> ${customizations.logo ? '✅ PRESENT' : '❌ MISSING'}</p>
                    <p><strong>Background:</strong> ${customizations.background ? '✅ PRESENT' : '❌ MISSING'}</p>
                    
                    ${customizations.logo ? `
                        <div>
                            <h4>Logo Preview:</h4>
                            <img src="${customizations.logo}" alt="Logo Preview" style="max-width: 200px; max-height: 100px; border: 1px solid #ccc;" onerror="this.parentNode.innerHTML+='<p style=color:red>❌ Error loading logo</p>'">
                        </div>
                    ` : '<p>No logo to display</p>'}
                    
                    ${customizations.background ? `
                        <div>
                            <h4>Background Preview:</h4>
                            <div style="width: 200px; height: 100px; background-image: url(${customizations.background}); background-size: cover; border: 1px solid #ccc;" onerror="this.parentNode.innerHTML+='<p style=color:red>❌ Error loading background</p>'"></div>
                        </div>
                    ` : '<p>No background to display</p>'}
                `;
            } catch (e) {
                document.getElementById('output').innerHTML = `<p style="color: red;">Error: ${e.message}</p>`;
            }
        }
        
        function fixCustomizations() {
            try {
                // Force add the latest uploaded images
                const customizations = JSON.parse(localStorage.getItem('establishmentCustomizations') || '{}');
                
                // Add the images that should be there
                if (!customizations.logo) {
                    customizations.logo = '/uploads/1765579114013-194519.png';
                }
                if (!customizations.background) {
                    customizations.background = '/uploads/1765579127632-3405.png';
                }
                
                localStorage.setItem('establishmentCustomizations', JSON.stringify(customizations));
                
                document.getElementById('output').innerHTML = `
                    <p style="color: green;">✅ Customizations fixed successfully!</p>
                    <pre>${JSON.stringify(customizations, null, 2)}</pre>
                    <p><strong>Refresh the pages to see the changes:</strong></p>
                    <ul>
                        <li><a href="/usuario.html" target="_blank">Menu (user)</a></li>
                        <li><a href="/admin.html" target="_blank">Admin</a></li>
                        <li><a href="/cozinha.html" target="_blank">Kitchen</a></li>
                        <li><a href="/balcao.html" target="_blank">Counter</a></li>
                        <li><a href="/garcom.html" target="_blank">Waiter</a></li>
                    </ul>
                `;
            } catch (e) {
                document.getElementById('output').innerHTML = `<p style="color: red;">Error: ${e.message}</p>`;
            }
        }
        
        function clearCustomizations() {
            try {
                localStorage.removeItem('establishmentCustomizations');
                document.getElementById('output').innerHTML = `
                    <p style="color: green;">✅ Customizations cleared successfully!</p>
                    <p>Refresh the page to see default settings.</p>
                `;
            } catch (e) {
                document.getElementById('output').innerHTML = `<p style="color: red;">Error: ${e.message}</p>`;
            }
        }
    </script>
</body>
</html>
